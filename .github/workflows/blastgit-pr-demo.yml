name: Blastgit PR Demo

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to render
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: blastgit-pr-demo-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  render-demo:
    name: Render PR demo video
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve PR metadata
        id: meta
        uses: actions/github-script@v8
        with:
          script: |
            const prNumberInput = core.getInput('pr_number');
            const prNumber = context.payload.pull_request?.number ?? (prNumberInput ? Number(prNumberInput) : null);
            if (!prNumber || Number.isNaN(prNumber)) {
              core.setFailed('Missing pull request number');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_title', String(pr.title || ''));

      - name: Install UI dependencies
        working-directory: ui
        shell: bash
        run: |
          npm ci

      - name: Install browser dependencies
        working-directory: ui
        shell: bash
        run: |
          npx playwright install --with-deps chromium

      - name: Start mock API server
        shell: bash
        env:
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
        run: |
          node <<'NODE' > /tmp/blastgit-demo-mock.log 2>&1 &
          const http = require("node:http");

          const prTitle = (process.env.PR_TITLE || "Traceway PR").trim();
          const prNumber = (process.env.PR_NUMBER || "0").trim();
          const nowIso = new Date().toISOString();

          const demoProject = {
            id: "project-demo-1",
            org_id: "org-demo-1",
            name: "Blastgit Demo",
            slug: "blastgit-demo",
            created_at: nowIso,
            updated_at: nowIso,
          };

          const demoQueueItem = {
            id: "queue-item-demo-1",
            dataset_id: "dataset-demo-1",
            status: "pending",
            claimed_by: null,
            original_data: {
              type: "generic",
              input: `PR #${prNumber}: ${prTitle}`,
              expected_output: "Show merged PR preview with hover video",
            },
            edited_data: null,
            created_at: nowIso,
            updated_at: nowIso,
          };

          const demoDataset = {
            id: "dataset-demo-1",
            name: "PR Review Queue",
            description: "Mocked queue for CI demo capture",
            datapoint_count: 1,
          };

          const demoSpan = {
            id: "span-demo-1",
            trace_id: "trace-demo-1",
            parent_id: null,
            name: `Review ${prTitle}`,
            status: "completed",
            kind: { type: "llm_call", provider: "openai", model: "gpt-4o-mini" },
            input: "Inspect PR changes",
            output: "Looks good",
            started_at: nowIso,
            ended_at: nowIso,
            tags: [],
          };

          function sendJson(res, status, payload) {
            res.writeHead(status, {
              "content-type": "application/json; charset=utf-8",
              "access-control-allow-origin": "*",
            });
            res.end(JSON.stringify(payload));
          }

          function sendSse(req, res) {
            res.writeHead(200, {
              "content-type": "text/event-stream",
              "cache-control": "no-cache, no-transform",
              connection: "keep-alive",
              "access-control-allow-origin": "*",
            });
            res.write("id: 1\n");
            res.write(`data: ${JSON.stringify({ type: "span_created", span: demoSpan })}\n\n`);
            const heartbeat = setInterval(() => {
              res.write(": ping\n\n");
            }, 15000);
            req.on("close", () => clearInterval(heartbeat));
          }

          const server = http.createServer((req, res) => {
            if (!req.url) return sendJson(res, 400, { error: "missing url" });
            const url = new URL(req.url, "http://127.0.0.1:4000");
            const path = url.pathname;

            if (req.method === "GET" && path === "/auth/config") {
              return sendJson(res, 200, { mode: "cloud", features: ["auth", "teams", "api_keys"] });
            }

            if (req.method === "GET" && path === "/auth/me") {
              return sendJson(res, 200, {
                org_id: "org-demo-1",
                project_id: "project-demo-1",
                user_id: "user-demo-1",
                scopes: ["traces_read", "traces_write", "datasets_read", "datasets_write", "analytics_read", "admin"],
                is_local_mode: false,
              });
            }

            if (req.method === "GET" && path === "/projects") {
              return sendJson(res, 200, [demoProject]);
            }

            if (req.method === "GET" && path === "/stats") {
              return sendJson(res, 200, { trace_count: 14, span_count: 67 });
            }

            if (req.method === "GET" && path === "/analytics/summary") {
              return sendJson(res, 200, {
                total_traces: 14,
                total_spans: 67,
                avg_latency_ms: 412,
                total_llm_calls: 24,
                total_tokens: 58221,
                total_cost: 12.74,
                error_count: 1,
                models_used: ["gpt-4o-mini"],
                providers_used: ["openai"],
                cost_by_model: [{ model: "gpt-4o-mini", span_count: 24, cost: 12.74 }],
                tokens_by_model: [{ model: "gpt-4o-mini", input_tokens: 30112, output_tokens: 28109, total_tokens: 58221 }],
              });
            }

            if (req.method === "GET" && path === "/spans") {
              return sendJson(res, 200, {
                items: [demoSpan],
                total: 1,
                next_cursor: null,
                has_more: false,
              });
            }

            if (req.method === "GET" && path === "/traces") {
              return sendJson(res, 200, {
                items: [{
                  id: "trace-demo-1",
                  name: `PR #${prNumber} Demo`,
                  status: "completed",
                  started_at: nowIso,
                  ended_at: nowIso,
                  tags: ["blastgit", `pr:${prNumber}`],
                }],
                total: 1,
                next_cursor: null,
                has_more: false,
              });
            }

            if (req.method === "GET" && path === "/datasets") {
              return sendJson(res, 200, { datasets: [demoDataset], count: 1 });
            }

            if (req.method === "GET" && path === "/queue") {
              return sendJson(res, 200, {
                items: [demoQueueItem],
                total: 1,
                next_cursor: null,
                has_more: false,
              });
            }

            if (req.method === "POST" && /^\/queue\/[^/]+\/claim$/.test(path)) {
              return sendJson(res, 200, { ...demoQueueItem, status: "claimed", claimed_by: "blastgit-demo" });
            }

            if (req.method === "POST" && /^\/queue\/[^/]+\/submit$/.test(path)) {
              return sendJson(res, 200, { ...demoQueueItem, status: "completed", claimed_by: "blastgit-demo" });
            }

            if (req.method === "GET" && path === "/org/members") {
              return sendJson(res, 200, [{ id: "user-demo-1", email: "demo@blastgit.ai", name: "Blastgit Demo", role: "owner" }]);
            }

            if (req.method === "GET" && path === "/events") {
              return sendSse(req, res);
            }

            return sendJson(res, 404, { code: "not_found", message: "endpoint not found", details: null });
          });

          server.listen(4000, "127.0.0.1");
          NODE
          echo $! > /tmp/blastgit-demo-mock.pid

      - name: Start UI dev server
        working-directory: ui
        shell: bash
        run: |
          npm run dev -- --host 127.0.0.1 --port 4173 > /tmp/blastgit-demo-server.log 2>&1 &
          echo $! > /tmp/blastgit-demo-server.pid

      - name: Wait for app
        shell: bash
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Dev server never became ready"
          cat /tmp/blastgit-demo-server.log || true
          exit 1

      - name: Capture real UI demo
        working-directory: ui
        env:
          DEMO_URL: http://127.0.0.1:4173/
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          OUT_WEBM: ${{ github.workspace }}/pr-demo.webm
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const { chromium } = require("playwright");

          async function assertNotAuth(page, contextLabel) {
            const currentPath = new URL(page.url()).pathname;
            if (["/login", "/signup"].includes(currentPath)) {
              throw new Error(`Redirected to auth while ${contextLabel}`);
            }
          }

          async function gotoStable(page, url, selector, contextLabel) {
            await page.goto(url, { waitUntil: "domcontentloaded", timeout: 45000 });
            if (selector) {
              await page.waitForSelector(selector, { timeout: 20000 });
            }
            await assertNotAuth(page, contextLabel);
            await page.waitForTimeout(900);
          }

          async function hoverFirstMatch(page, selectors, dwellMs = 900) {
            for (const selector of selectors) {
              const locator = page.locator(selector).first();
              if (await locator.count()) {
                const box = await locator.boundingBox();
                if (!box) continue;
                await page.mouse.move(box.x + box.width / 2, box.y + box.height / 2);
                await page.waitForTimeout(dwellMs);
                return true;
              }
            }
            return false;
          }

          async function clickIfPresent(page, selector) {
            const locator = page.locator(selector).first();
            if (!(await locator.count())) return false;
            await locator.click({ timeout: 5000 });
            await page.waitForTimeout(650);
            return true;
          }

          async function playReviewSequence(page, base, prTitle, prNumber) {
            await gotoStable(page, `${base}review`, "h1:has-text('Review')", "opening review page");

            const prLabel = prNumber ? `#${prNumber}` : "";
            await hoverFirstMatch(page, [
              `[data-pr-number='${prNumber}']`,
              `a:has-text("${prLabel}")`,
              `a:has-text("${prTitle}")`,
              `text=${prLabel}`,
              "tbody tr",
              "button:has-text('Claim')",
              "a,button,[role='button']",
            ], 1100);

            await clickIfPresent(page, "button:has-text('Claimed')");
            await clickIfPresent(page, "button:has-text('Completed')");
            await clickIfPresent(page, "button:has-text('Pending')");

            await page.evaluate(() => window.scrollTo({ top: 220, behavior: "smooth" }));
            await page.waitForTimeout(700);
            await page.evaluate(() => window.scrollTo({ top: 0, behavior: "smooth" }));
            await page.waitForTimeout(900);
          }

          (async () => {
            const outWebm = process.env.OUT_WEBM;
            const base = process.env.DEMO_URL;
            const prTitle = (process.env.PR_TITLE || "").trim();
            const prNumber = (process.env.PR_NUMBER || "").trim();
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 },
              colorScheme: "dark",
              recordVideo: {
                dir: process.cwd(),
                size: { width: 1280, height: 720 },
              },
            });
            await context.addInitScript(() => {
              try {
                localStorage.setItem("traceway:theme", "dark");
                document.documentElement.dataset.theme = "dark";
              } catch {
                // Ignore localStorage errors.
              }
            });
            const page = await context.newPage();
            await playReviewSequence(page, base, prTitle, prNumber);

            await gotoStable(page, `${base}`, "h1:has-text('Dashboard')", "opening dashboard page");
            await page.mouse.move(180, 118);
            await page.waitForTimeout(450);
            await page.evaluate(() => window.scrollTo({ top: 480, behavior: "smooth" }));
            await page.waitForTimeout(900);
            await page.evaluate(() => window.scrollTo({ top: 0, behavior: "smooth" }));
            await page.waitForTimeout(1200);

            await gotoStable(page, `${base}review`, "h1:has-text('Review')", "returning to review page");
            await hoverFirstMatch(page, ["tbody tr", "button:has-text('Claim')"], 800);
            await page.waitForTimeout(1600);

            const video = page.video();
            await context.close();
            await browser.close();
            if (!video) throw new Error("No video captured");
            const path = await video.path();
            fs.copyFileSync(path, outWebm);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Ensure ffmpeg is available
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Convert demo to mp4
        shell: bash
        run: |
          ffmpeg -y -ss 0.35 -i pr-demo.webm -r 30 -c:v libx264 -crf 23 -pix_fmt yuv420p -movflags +faststart pr-demo.mp4

      - name: Stop dev server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/blastgit-demo-server.pid ]; then
            kill "$(cat /tmp/blastgit-demo-server.pid)" >/dev/null 2>&1 || true
          fi
          if [ -f /tmp/blastgit-demo-mock.pid ]; then
            kill "$(cat /tmp/blastgit-demo-mock.pid)" >/dev/null 2>&1 || true
          fi

      - name: Upload server log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: blastgit-pr-demo-server-log
          path: |
            /tmp/blastgit-demo-server.log
            /tmp/blastgit-demo-mock.log

      - name: Upload demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: blastgit-pr-demo-video
          path: pr-demo.mp4
          retention-days: 30
