name: Blastgit PR Demo

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to render
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: blastgit-pr-demo-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  render-demo:
    name: Render PR demo video
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Resolve PR metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const prNumberInput = core.getInput('pr_number');
            const prNumber = context.payload.pull_request?.number ?? (prNumberInput ? Number(prNumberInput) : null);
            if (!prNumber || Number.isNaN(prNumber)) {
              core.setFailed('Missing pull request number');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const clean = (value, max = 120) => String(value || '').replace(/\r?\n/g, ' ').replace(/\s+/g, ' ').trim().slice(0, max);
            const state = pr.merged ? 'MERGED' : String(pr.state || 'open').toUpperCase();
            const changed = Number(pr.changed_files || 0);
            const additions = Number(pr.additions || 0);
            const deletions = Number(pr.deletions || 0);
            const headSha = String(pr.head?.sha || '').slice(0, 7) || 'unknown';

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('line_repo', clean(`${owner}/${repo}`, 80));
            core.setOutput('line_status', clean(`PR #${prNumber} ${state}`, 80));
            core.setOutput('line_title', clean(pr.title, 150) || '(no title)');
            core.setOutput('line_author', clean(`by @${pr.user?.login || 'unknown'}`, 80));
            core.setOutput('line_stats', clean(`${changed} files  +${additions}  -${deletions}  sha ${headSha}`, 120));
            core.setOutput('line_url', clean(pr.html_url, 180));

      - name: Ensure ffmpeg is available
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Build demo frame text files
        shell: bash
        run: |
          printf '%s\n' "${{ steps.meta.outputs.line_repo }}" > line_repo.txt
          printf '%s\n' "${{ steps.meta.outputs.line_status }}" > line_status.txt
          printf '%s\n' "${{ steps.meta.outputs.line_title }}" > line_title.txt
          printf '%s\n' "${{ steps.meta.outputs.line_author }}" > line_author.txt
          printf '%s\n' "${{ steps.meta.outputs.line_stats }}" > line_stats.txt
          printf '%s\n' "${{ steps.meta.outputs.line_url }}" > line_url.txt

      - name: Render mp4 demo
        shell: bash
        run: |
          ffmpeg -y \
            -f lavfi -i color=c=0x05060b:s=1280x720:d=8 \
            -vf "
              drawbox=x=64:y=72:w=1152:h=576:color=0x0c1019@1:t=fill,
              drawbox=x=64:y=72:w=1152:h=576:color=0x2b3347@0.8:t=2,
              drawbox=x=64:y=72:w=1152:h=6:color=0xea580c@1:t=fill,
              drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='MERGED PR DEMO PREVIEW':fontcolor=0xffffff@0.78:fontsize=28:x=96:y=104,
              drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:textfile=line_repo.txt:fontcolor=0xffffff@0.9:fontsize=46:x=96:y=178,
              drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:textfile=line_status.txt:fontcolor=0xf97316@1:fontsize=40:x=96:y=246,
              drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:textfile=line_title.txt:fontcolor=0xffffff@0.95:fontsize=40:x=96:y=316,
              drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:textfile=line_author.txt:fontcolor=0xffffff@0.72:fontsize=34:x=96:y=384,
              drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf:textfile=line_stats.txt:fontcolor=0xffffff@0.62:fontsize=30:x=96:y=448,
              drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf:text='Auto-generated by Blastgit. No contributor action required.':fontcolor=0xffffff@0.56:fontsize=24:x=96:y=520,
              drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf:textfile=line_url.txt:fontcolor=0xffffff@0.44:fontsize=20:x=96:y=560
            " \
            -c:v libx264 -pix_fmt yuv420p -profile:v main -level 4.0 -r 30 \
            -movflags +faststart \
            pr-demo.mp4

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: blastgit-pr-demo-video
          path: pr-demo.mp4
          retention-days: 30
